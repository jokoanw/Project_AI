<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten AI Kelas Fisika D</title>

    <script type="text/x-mathjax-config">
      MathJax.Hub.Config({
        tex2jax: {
          inlineMath: [['$','$'], ['\\(','\\)']],
          displayMath: [['$$','$$'], ['\\[','\\]']],
          processEscapes: true
        }
      });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML"></script>

    <style>
        /* 1. Background Pink/Putih Aesthetic */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #FFF5F7; /* Soft Pinkish White */
            margin: 0; 
            color: #4A4A4A; /* Teks abu-abu gelap biar elegan dan gampang dibaca */
            padding-bottom: 120px; /* Jarak aman biar chat terbawah ga ketutup input */
        }
        
        .chat-container { width: 100%; max-width: 800px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; }
        
        h2 { text-align: center; color: #D6728F; margin-top: 20px; margin-bottom: 30px; font-weight: 700; letter-spacing: 1px;}
        
        #chat-box { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        
        .message { padding: 15px 20px; border-radius: 20px; max-width: 80%; line-height: 1.6; font-size: 15px; word-wrap: break-word; white-space: pre-wrap; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        
        /* Bubble Chat Kamu (Pink Aesthetic) */
        .user-msg { background-color: #FFB6C1; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }
        
        /* Bubble Chat Mainn (Putih Bersih) */
        .ai-msg { background-color: #FFFFFF; color: #4A4A4A; align-self: flex-start; border-bottom-left-radius: 4px; overflow-x: auto; border: 1px solid #FFE4E1; }
        
        /* 2. FIX "NEMBUS": Tembok Background Full Width di Bawah */
        .input-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 245, 247, 0.95); /* Warna background body tapi agak transparan */
            backdrop-filter: blur(8px); /* Efek blur ala Apple/MacBook */
            padding: 15px 0 25px 0;
            box-shadow: 0 -5px 20px rgba(214, 114, 143, 0.1);
            z-index: 100;
        }

        .input-area { width: 90%; max-width: 800px; margin: 0 auto; display: flex; gap: 10px; }
        
        input[type="text"] { flex: 1; padding: 15px 20px; border: 2px solid #FFE4E1; border-radius: 25px; background: #FFFFFF; color: #4A4A4A; outline: none; font-size: 15px; transition: 0.3s; }
        input[type="text"]:focus { border-color: #FFB6C1; box-shadow: 0 0 10px rgba(255, 182, 193, 0.3); }
        input[type="text"]::placeholder { color: #B0B0B0; }
        
        button { padding: 15px 30px; background-color: #D6728F; color: #FFFFFF; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        button:hover { background-color: #C05C7A; transform: translateY(-2px); }
        button:disabled { background-color: #D3D3D3; cursor: not-allowed; transform: none; }

        /* Scrollbar Estetik */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #FFB6C1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2> Asisten AI Kelas Fisika D </h2>
    <div id="chat-box">
<div class="message ai-msg">Halo, Aku Mainn! Aku asisten AI kelas kita yang dibuat oleh Afdhi. Ada yang mau ditanya soal tugas atau jadwal kuliah?</div>   </div>
</div>

<div class="input-wrapper">
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ketik pesanmu di sini..." onkeypress="handleEnter(event)">
        <button id="send-btn" onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    function handleEnter(event) {
        if (event.key === 'Enter') sendMessage();
    }

    function scrollToBottom() {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const message = inputField.value.trim();
        const chatBox = document.getElementById('chat-box');

        if (!message) return;

        inputField.disabled = true;
        sendBtn.disabled = true;

        const userDiv = document.createElement('div');
        userDiv.className = 'message user-msg';
        userDiv.textContent = message;
        chatBox.appendChild(userDiv);

        inputField.value = '';
        scrollToBottom();

        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai-msg';
        loadingDiv.innerHTML = '<i>Mainn lagi mikir...</i>';
        chatBox.appendChild(loadingDiv);
        scrollToBottom();

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            chatBox.removeChild(loadingDiv);

            let finalReply = data.reply.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-msg';
            aiDiv.innerHTML = finalReply;
            chatBox.appendChild(aiDiv);

            if (window.MathJax) {
                MathJax.Hub.Queue(["Typeset", MathJax.Hub, aiDiv]);
                MathJax.Hub.Queue(function() {
                    scrollToBottom(); 
                });
            } else {
                scrollToBottom();
            }

        } catch (error) {
            if (chatBox.contains(loadingDiv)) chatBox.removeChild(loadingDiv);
            const errDiv = document.createElement('div');
            errDiv.className = 'message ai-msg';
            errDiv.style.color = '#ff4d4d';
            errDiv.textContent = 'Limit API / Koneksi terputus. Coba lagi ya!';
            chatBox.appendChild(errDiv);
            scrollToBottom();
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
        }
    }
</script>
</body>
</html>
