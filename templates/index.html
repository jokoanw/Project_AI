<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Kelas Fisika D</title>

    <script type="text/x-mathjax-config">
      MathJax.Hub.Config({
        tex2jax: {
          inlineMath: [['$','$'], ['\\(','\\)']],
          displayMath: [['$$','$$'], ['\\[','\\]']],
          processEscapes: true
        }
      });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML"></script>

    <style>
        /* 1. Body dibiarkan bebas scroll ke bawah */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2f; margin: 0; color: #fff; padding-bottom: 100px; }
        
        /* 2. Container dilebarin biar lega kayak Gemini */
        .chat-container { width: 100%; max-width: 800px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; }
        h2 { text-align: center; color: #00d2ff; margin-top: 20px; margin-bottom: 30px; }
        
        /* 3. Chat box nggak dikurung lagi tingginya */
        #chat-box { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        
        .message { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; font-size: 15px; word-wrap: break-word; white-space: pre-wrap; }
        .user-msg { background-color: #00d2ff; color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        .ai-msg { background-color: #3f3f5a; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; overflow-x: auto; }
        
        /* 4. Input area ditempel (fixed) di bawah layar */
        .input-area { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; display: flex; gap: 10px; background-color: #1e1e2f; padding: 10px 0; z-index: 100; }
        
        input[type="text"] { flex: 1; padding: 15px; border: none; border-radius: 10px; background: #3f3f5a; color: white; outline: none; font-size: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        button { padding: 15px 25px; background-color: #00d2ff; color: #000; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        button:hover { background-color: #009ecc; }
        button:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>⚡ Asisten AI Kelas Fisika D</h2>
    <div id="chat-box">
        <div class="message ai-msg">Halo, Aku Mainn! Asisten AI kelas kita yang dibuat oleh Afdhi. Ada yang mau ditanya soal tugas atau jadwal kuliah?</div>    </div>    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ketik pesanmu di sini..." onkeypress="handleEnter(event)">
        <button id="send-btn" onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    function handleEnter(event) {
        if (event.key === 'Enter') sendMessage();
    }

    // Jurus baru: Scroll seluruh layar web, bukan scroll kotaknya
    function scrollToBottom() {
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const message = inputField.value.trim();
        const chatBox = document.getElementById('chat-box');

        if (!message) return;

        inputField.disabled = true;
        sendBtn.disabled = true;

        const userDiv = document.createElement('div');
        userDiv.className = 'message user-msg';
        userDiv.textContent = message;
        chatBox.appendChild(userDiv);

        inputField.value = '';
        scrollToBottom(); // Panggil scroll layar penuh

        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai-msg';
        loadingDiv.innerHTML = '<i>Mainn lagi mikir...</i>';
        chatBox.appendChild(loadingDiv);
        scrollToBottom();

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            chatBox.removeChild(loadingDiv);

            let finalReply = data.reply.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-msg';
            aiDiv.innerHTML = finalReply;
            chatBox.appendChild(aiDiv);

            if (window.MathJax) {
                MathJax.Hub.Queue(["Typeset", MathJax.Hub, aiDiv]);
                MathJax.Hub.Queue(function() {
                    scrollToBottom(); // Scroll lagi setelah rumus mekar
                });
            } else {
                scrollToBottom();
            }

        } catch (error) {
            if (chatBox.contains(loadingDiv)) chatBox.removeChild(loadingDiv);
            const errDiv = document.createElement('div');
            errDiv.className = 'message ai-msg';
            errDiv.style.color = '#ff4d4d';
            errDiv.textContent = 'Koneksi terputus. Coba lagi ya!';
            chatBox.appendChild(errDiv);
            scrollToBottom();
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
        }
    }
</script>
</body>
</html>
