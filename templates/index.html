<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Kelas Fisika D</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2f; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .chat-container { width: 100%; max-width: 500px; background: #2a2a40; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 20px; }
        h2 { text-align: center; color: #00d2ff; margin-top: 0; }
        #chat-box { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; padding-right: 10px; }
        .message { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; font-size: 15px; }
        .user-msg { background-color: #00d2ff; color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        .ai-msg { background-color: #3f3f5a; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 15px; border: none; border-radius: 10px; background: #3f3f5a; color: white; outline: none; font-size: 15px; }
        input[type="text"]::placeholder { color: #aaa; }
        button { padding: 15px 25px; background-color: #00d2ff; color: #000; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        button:hover { background-color: #009ecc; }
    </style>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es6/tex-mml-chtml.js"></script>

<script>
  // Konfigurasi agar MathJax mau membaca simbol $ dan $$
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
  };
</script>
</head>
<body>

<div class="chat-container">
    <h2>⚡ Asisten Kelas Fisika D</h2>
    <div id="chat-box">
        <div class="message ai-msg">Halo! Aku asisten AI kelas kita yang dibuat oleh Afdhi. Ada yang mau ditanyain soal tugas, jadwal, atau materi kelas kita ga?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ketik pesanmu di sini..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    function handleEnter(event) {
        if (event.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const message = inputField.value;
        if (!message) return;
        async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const message = inputField.value;
        if (!message) return;

        const chatBox = document.getElementById('chat-box');
        
        // Nampilin pesan kamu
        chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
        inputField.value = ''; 
        chatBox.scrollTop = chatBox.scrollHeight;

        // Nampilin loading
        const loadingId = "loading-" + Date.now();
        chatBox.innerHTML += `<div id="${loadingId}" class="message ai-msg"><i>Bentar, Mainn lagi mikir...</i></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            
            // Hapus loading
            document.getElementById(loadingId).remove();
            
            // Format teks (ubah enter jadi baris baru di web)
            const formattedReply = data.reply.replace(/\n/g, '<br>');
            
            // Nampilin jawaban AI
            chatBox.innerHTML += `<div class="message ai-msg">${formattedReply}</div>`;
            
            // --- BAGIAN PALING PENTING: Render Rumus Fisika ---
            if (window.MathJax) {
                MathJax.typesetPromise().catch((err) => console.log(err.message));
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            if (document.getElementById(loadingId)) document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<div class="message ai-msg" style="color: #ff4d4d;">Waduh, koneksi putus. Coba lagi ya!</div>`;
        }
    }

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            
            document.getElementById(loadingId).remove();
            const formattedReply = data.reply.replace(/\n/g, '<br>');
            chatBox.innerHTML += `<div class="message ai-msg">${formattedReply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<div class="message ai-msg" style="color: #ff4d4d;">Gagal terhubung ke server.</div>`;
        }
    }
</script>

</body>
</html>
