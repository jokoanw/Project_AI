<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Kelas Fisika D</title>
    
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        startup: { typeset: false }
      };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es6/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2f; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .chat-container { width: 100%; max-width: 500px; background: #2a2a40; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 20px; display: flex; flex-direction: column; }
        h2 { text-align: center; color: #00d2ff; margin-top: 0; }
        #chat-box { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; padding-right: 10px; scroll-behavior: smooth; }
        
        /* KUNCI: white-space: pre-wrap bikin enter dari AI langsung rapi tanpa merusak MathJax */
        .message { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; font-size: 15px; word-wrap: break-word; white-space: pre-wrap; }
        
        .user-msg { background-color: #00d2ff; color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        .ai-msg { background-color: #3f3f5a; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 15px; border: none; border-radius: 10px; background: #3f3f5a; color: white; outline: none; font-size: 15px; }
        button { padding: 15px 25px; background-color: #00d2ff; color: #000; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        button:hover { background-color: #009ecc; }
        button:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>⚡ Asisten Kelas Fisika D</h2>
    <div id="chat-box">
        <div class="message ai-msg">Halo! Aku asisten AI kelas kita yang dibuat oleh Afdhi. Ada yang mau ditanya soal tugas, jadwal, atau materi?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ketik pesanmu di sini..." onkeypress="handleEnter(event)">
        <button id="send-btn" onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    // Bikin rumus di pesan pertama muncul
    window.addEventListener('load', () => {
        if (window.MathJax && window.MathJax.typesetPromise) {
            MathJax.typesetPromise();
        }
    });

    function handleEnter(event) {
        if (event.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const message = inputField.value.trim();
        const chatBox = document.getElementById('chat-box');
        
        if (!message) return;

        inputField.disabled = true;
        sendBtn.disabled = true;

        // Tampilkan pesan kamu (pakai AppendChild biar rumus lama ga rusak)
        const userDiv = document.createElement('div');
        userDiv.className = 'message user-msg';
        userDiv.textContent = message;
        chatBox.appendChild(userDiv);
        
        inputField.value = ''; 
        chatBox.scrollTop = chatBox.scrollHeight;

        // Tampilkan Loading
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai-msg';
        loadingDiv.innerHTML = '<i>Bentar, Mainn lagi mikir...</i>';
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            
            const data = await response.json();
            
            // Hapus Loading
            chatBox.removeChild(loadingDiv);
            
            // Rapikan teks tebal Markdown (**)
            let finalReply = data.reply.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // Tampilkan Jawaban AI
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-msg';
            aiDiv.innerHTML = finalReply;
            chatBox.appendChild(aiDiv);
            
            // Suruh MathJax render rumus HANYA di pesan yang baru muncul!
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise([aiDiv]).catch((err) => console.log(err));
            }
            
        } catch (error) {
            if (chatBox.contains(loadingDiv)) chatBox.removeChild(loadingDiv);
            
            const errDiv = document.createElement('div');
            errDiv.className = 'message ai-msg';
            errDiv.style.color = '#ff4d4d';
            errDiv.textContent = 'Waduh, gagal konek ke server. Coba kirim ulang ya!';
            chatBox.appendChild(errDiv);
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }
</script>

</body>
</html>
